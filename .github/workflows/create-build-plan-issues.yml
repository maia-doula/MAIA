name: Create 3-Day Build Plan Issues

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - copilot/create-issues-for-build-plan
    paths:
      - '.github/workflows/create-build-plan-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Create labels
        run: |
          gh label create "day-1" --repo "$REPO" --color "0075ca" --description "Day 1 - Live Voice Agent (March 12, 2026)" --force
          gh label create "day-2" --repo "$REPO" --color "e4e669" --description "Day 2 - Vision + Doula Intelligence (March 13, 2026)" --force
          gh label create "day-3" --repo "$REPO" --color "d93f0b" --description "Day 3 - Polish + Demo Experience (March 14, 2026)" --force
          gh label create "frontend" --repo "$REPO" --color "7057ff" --description "Frontend feature" --force
          gh label create "backend" --repo "$REPO" --color "008672" --description "Backend feature" --force

      - name: Create all build plan issues
        run: |
          create_issue_if_missing() {
            local title="$1"
            local body="$2"
            local labels="$3"
            if gh api "repos/$REPO/issues?state=open&per_page=100" --paginate --jq '.[].title' 2>/dev/null | grep -qF "$title"; then
              echo "Skipped (already exists): $title"
            else
              gh issue create --repo "$REPO" --title "$title" --body "$body" --label "$labels"
              echo "Created: $title"
            fi
          }

          # ── Day 1: Live Voice Agent (Target: 2026-03-12) ──────────────────────

          # Frontend
          create_issue_if_missing \
            "[Day 1][Frontend] Create Web App" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Frontend
          **Target Date:** 2026-03-12

          Set up the web application as the foundation for the MAIA voice doula interface.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,frontend"

          create_issue_if_missing \
            "[Day 1][Frontend] Build Voice Input" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Frontend
          **Target Date:** 2026-03-12

          Implement voice input capability so users can speak to the MAIA doula assistant.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,frontend"

          create_issue_if_missing \
            "[Day 1][Frontend] Add Voice Output" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Frontend
          **Target Date:** 2026-03-12

          Implement voice output so the MAIA doula assistant can respond verbally to users.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,frontend"

          create_issue_if_missing \
            "[Day 1][Frontend] Build Chat UI" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Frontend
          **Target Date:** 2026-03-12

          Build the chat user interface for displaying conversation history and interactions.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,frontend"

          create_issue_if_missing \
            "[Day 1][Frontend] Play AI voice responses, update READMEs & logs" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Frontend
          **Target Date:** 2026-03-12

          Integrate AI voice response playback and keep READMEs and development logs updated.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,frontend"

          # Backend
          create_issue_if_missing \
            "[Day 1][Backend] Set up Google Cloud project" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Backend
          **Target Date:** 2026-03-12

          Initialize and configure the Google Cloud project to host MAIA's backend infrastructure.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,backend"

          create_issue_if_missing \
            "[Day 1][Backend] Install GenAI SDK" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Backend
          **Target Date:** 2026-03-12

          Install and configure the Google GenAI SDK for integrating Gemini AI capabilities.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,backend"

          create_issue_if_missing \
            "[Day 1][Backend] Build Gemini Live API connection" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Backend
          **Target Date:** 2026-03-12

          Establish a live connection to the Gemini API to enable real-time AI interactions.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,backend"

          create_issue_if_missing \
            "[Day 1][Backend] Write AI Doula system prompt" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Backend
          **Target Date:** 2026-03-12

          Craft the system prompt that defines MAIA's persona, tone, and capabilities as a doula assistant.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,backend"

          create_issue_if_missing \
            "[Day 1][Backend] Create streaming endpoint" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Backend
          **Target Date:** 2026-03-12

          Build a streaming API endpoint that delivers real-time AI responses to the frontend.

          **Goal:** Real-time voice AI doula conversation" \
            "day-1,backend"

          # ── Day 2: Vision + Doula Intelligence (Target: 2026-03-13) ───────────

          # Frontend
          create_issue_if_missing \
            "[Day 2][Frontend] Build Contraction Timer UI" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Frontend
          **Target Date:** 2026-03-13

          Design and implement the contraction timer interface for tracking labor contractions.

          **Goal:** Vision input + contraction tracking" \
            "day-2,frontend"

          create_issue_if_missing \
            "[Day 2][Frontend] Add Camera Input" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Frontend
          **Target Date:** 2026-03-13

          Integrate camera input to enable vision-based interaction with the MAIA assistant.

          **Goal:** Vision input + contraction tracking" \
            "day-2,frontend"

          create_issue_if_missing \
            "[Day 2][Frontend] Create Vision Interaction UI" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Frontend
          **Target Date:** 2026-03-13

          Build the UI components for displaying and interacting with vision/camera-based features.

          **Goal:** Vision input + contraction tracking" \
            "day-2,frontend"

          create_issue_if_missing \
            "[Day 2][Frontend] Build Dashboard Layout" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Frontend
          **Target Date:** 2026-03-13

          Create a unified dashboard layout that brings together voice, camera, and contraction tracking features.

          **Goal:** Vision input + contraction tracking" \
            "day-2,frontend"

          create_issue_if_missing \
            "[Day 2][Frontend] Update READMEs & logs" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Frontend
          **Target Date:** 2026-03-13

          Update documentation and development logs to reflect Day 2 progress and new features.

          **Goal:** Vision input + contraction tracking" \
            "day-2,frontend"

          # Backend
          create_issue_if_missing \
            "[Day 2][Backend] Create Contraction Data Model" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

          Design and implement the data model for storing and managing contraction tracking data.

          **Goal:** Vision input + contraction tracking" \
            "day-2,backend"

          create_issue_if_missing \
            "[Day 2][Backend] Build Contraction Analysis Logic" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

          Develop algorithms to analyze contraction patterns, frequency, and duration for labor assessment.

          **Goal:** Vision input + contraction tracking" \
            "day-2,backend"

          create_issue_if_missing \
            "[Day 2][Backend] Send Contraction Data to Gemini" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

          Integrate contraction tracking data with Gemini AI for intelligent labor pattern interpretation.

          **Goal:** Vision input + contraction tracking" \
            "day-2,backend"

          create_issue_if_missing \
            "[Day 2][Backend] Add safety guardrails + symptom escalation detection" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

          Implement safety guardrails and logic to detect concerning symptoms that require medical escalation.

          **Goal:** Vision input + contraction tracking" \
            "day-2,backend"

          create_issue_if_missing \
            "[Day 2][Backend] Create Firestore database" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

          Set up and configure a Firestore database to persist user data, contraction records, and session history.

          **Goal:** Vision input + contraction tracking" \
            "day-2,backend"

          # ── Day 3: Polish + Demo Experience (Target: 2026-03-14) ──────────────

          # Frontend
          create_issue_if_missing \
            "[Day 3][Frontend] Polish UI" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Frontend
          **Target Date:** 2026-03-14

          Refine and polish the overall user interface for a polished, professional hackathon demo appearance.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,frontend"

          create_issue_if_missing \
            "[Day 3][Frontend] Add Breathing Animation" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Frontend
          **Target Date:** 2026-03-14

          Add guided breathing animation to help users during contractions and stressful moments.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,frontend"

          create_issue_if_missing \
            "[Day 3][Frontend] Create Demo Flow" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Frontend
          **Target Date:** 2026-03-14

          Design and implement a guided demo flow that showcases all MAIA features for hackathon judges.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,frontend"

          create_issue_if_missing \
            "[Day 3][Frontend] Add animation UI elements" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Frontend
          **Target Date:** 2026-03-14

          Enhance the UI with smooth animations and transitions for a more engaging user experience.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,frontend"

          create_issue_if_missing \
            "[Day 3][Frontend] Record Demo Video" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Frontend
          **Target Date:** 2026-03-14

          Record a high-quality demo video showcasing all MAIA features for hackathon submission.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,frontend"

          # Backend
          create_issue_if_missing \
            "[Day 3][Backend] Deploy backend to Cloud Run" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Backend
          **Target Date:** 2026-03-14

          Deploy the MAIA backend service to Google Cloud Run for production-ready hosting.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,backend"

          create_issue_if_missing \
            "[Day 3][Backend] Add advocacy assistant prompts" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Backend
          **Target Date:** 2026-03-14

          Add specialized prompts that enable MAIA to advocate for patients' rights and preferences in healthcare settings.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,backend"

          create_issue_if_missing \
            "[Day 3][Backend] Add Postpartum Check-In Logic" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Backend
          **Target Date:** 2026-03-14

          Implement postpartum check-in functionality to support new mothers after delivery.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,backend"

          create_issue_if_missing \
            "[Day 3][Backend] Optimize AI response flow" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Backend
          **Target Date:** 2026-03-14

          Optimize the AI response pipeline for faster, more reliable interactions during the live demo.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,backend"

          create_issue_if_missing \
            "[Day 3][Backend] Implement Symptom Summary Generator" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Backend
          **Target Date:** 2026-03-14

          Build a feature that generates concise symptom summaries to help users communicate with healthcare providers.

          **Goal:** Hackathon-ready live demo, deployment-ready" \
            "day-3,backend"
