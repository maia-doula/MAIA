name: Create 3-Day Build Plan Issues

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - copilot/create-issues-for-build-plan
      - copilot/create-issues-for-3-day-build
      - copilot/add-new-features-as-issues
    paths:
      - '.github/workflows/create-build-plan-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Create labels
        run: |
          gh label create "day-1" --repo "$REPO" --color "0075ca" --description "Day 1 - Live Voice Agent (March 12, 2026)" --force
          gh label create "day-2" --repo "$REPO" --color "e4e669" --description "Day 2 - Vision + Doula Intelligence (March 13, 2026)" --force
          gh label create "day-3" --repo "$REPO" --color "d93f0b" --description "Day 3 - Polish + Demo Experience (March 14, 2026)" --force
          gh label create "frontend" --repo "$REPO" --color "7057ff" --description "Frontend feature" --force
          gh label create "backend" --repo "$REPO" --color "008672" --description "Backend feature" --force
          gh label create "ai-agent" --repo "$REPO" --color "f9d0c4" --description "AI Agent feature" --force

      - name: Update and create all build plan issues
        run: |
          # Create a new issue only if no open issue with that exact title exists
          create_issue_if_missing() {
            local title="$1"
            local body="$2"
            local labels_csv="$3"  # comma-separated e.g. "day-1,frontend"
            # Use REST API + jq --arg to safely check for existing issues by exact title
            local existing
            existing=$(gh api "repos/$REPO/issues?state=open&per_page=100" --paginate \
              2>/dev/null | jq --arg t "$title" '.[] | select(.title == $t) | .number' | head -1 || true)
            if [ -n "$existing" ]; then
              echo "Skipped (already exists #$existing): $title"
              return
            fi
            # Create issue via REST API using jq for safe JSON encoding
            echo "$labels_csv" | tr ',' '\n' | jq -R . | jq -s \
              --arg title "$title" --arg body "$body" \
              '{title: $title, body: $body, labels: .}' | \
              gh api "repos/$REPO/issues" -X POST --input - --silent
            echo "Created: $title"
          }

          # Rename an existing open issue to a new title (updates title and body)
          rename_issue() {
            local old_title="$1"
            local new_title="$2"
            local new_body="$3"
            local existing
            existing=$(gh api "repos/$REPO/issues?state=open&per_page=100" --paginate \
              2>/dev/null | jq --arg t "$old_title" '.[] | select(.title == $t) | .number' | head -1 || true)
            if [ -n "$existing" ]; then
              jq -n --arg title "$new_title" --arg body "$new_body" \
                '{title: $title, body: $body}' | \
                gh api "repos/$REPO/issues/$existing" -X PATCH --input - --silent
              echo "Updated #$existing: '$old_title' -> '$new_title'"
            fi
          }

          # ── Rename outdated issues to match the current build plan ─────────────

          rename_issue \
            "[Day 1][Frontend] Play AI voice responses, update READMEs & logs" \
            "[Day 1][Frontend] Add contacts section, update READMEs & logs" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Frontend
          **Target Date:** 2026-03-12

          Add an emergency contacts section and keep READMEs and development logs updated to reflect Day 1 progress.

          **Goal:** Real-time voice AI doula conversation"

          rename_issue \
            "[Day 1][Backend] Install GenAI SDK" \
            "[Day 1][Backend] Create backend server" \
            "**Day:** Day 1 — Live Voice Agent
          **Category:** Backend
          **Target Date:** 2026-03-12

          Initialize and configure the Node.js/Express backend server as the foundation for the MAIA API.

          **Goal:** Real-time voice AI doula conversation"

          rename_issue \
            "[Day 2][Frontend] Update READMEs & logs" \
            "[Day 2][Frontend] Add quick notification button during labor" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Frontend
          **Target Date:** 2026-03-13

          Add a quick-access notification button that users can tap during contractions to alert contacts or flag urgent symptoms.

          **Goal:** Vision input + contraction tracking"

          rename_issue \
            "[Day 2][Backend] Create Contraction Data Model" \
            "[Day 2][Backend] Create contraction tracking API" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

          Build the API endpoints for creating, reading, and managing contraction tracking records.

          **Goal:** Vision input + contraction tracking"

          rename_issue \
            "[Day 2][Backend] Build Contraction Analysis Logic" \
            "[Day 2][Backend] Add labor pattern detection" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

          Develop algorithms to detect labor patterns from contraction frequency, duration, and interval data.

          **Goal:** Vision input + contraction tracking"

          rename_issue \
            "[Day 2][Backend] Add safety guardrails + symptom escalation detection" \
            "[Day 2][Backend] Add safety guardrails" \
            "**Day:** Day 2 — Vision + Doula Intelligence
          **Category:** Backend
          **Target Date:** 2026-03-13

