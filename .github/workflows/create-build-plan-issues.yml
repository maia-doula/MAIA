            "[Day 3][Frontend] Create Demo Flow" \
            "[Day 3][Frontend] Add AI-generated message preview" \
            "**Day:** Day 3 — Polish + Demo Experience
          **Category:** Frontend
          **Target Date:** 2026-03-14

          Add a preview panel that displays AI-generated messages and summaries before they are sent or confirmed.

          **Goal:** Hackathon-ready live demo, deployment-ready"

          # ── Day 1: Live Voice Agent (Target: 2026-03-12) ──────────────────────

